name: Test Windows Install

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check versions
        run: |
          $PSVersionTable.PSVersion
          node --version

      - name: Syntax check JS files
        run: |
          foreach ($f in @("lib/shellish-cmd.js","lib/safe-rm.js","lib/run.js","lib/render.js","lib/context.js")) {
            $code = Get-Content $f -Raw
            # Strip shebang so node doesn't choke on #!
            if ($code.StartsWith("#!")) {
              $code = $code.Substring($code.IndexOf("`n") + 1)
            }
            $code | node --check --input-type=commonjs 2>&1
            if ($LASTEXITCODE -ne 0) { Write-Error "Syntax error in $f"; exit 1 }
            Write-Host "  OK  $f"
          }

      - name: Syntax check install.ps1
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\install.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Host "install.ps1 syntax OK"

      - name: Syntax check profile.ps1
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\shell\profile.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Host "profile.ps1 syntax OK"

      - name: Load profile.ps1 in Windows PowerShell 5.1
        shell: powershell
        run: |
          . "$PWD\shell\profile.ps1"
          if (-not $global:_shellishBin) { Write-Error "profile did not set shellish bin"; exit 1 }
          if (-not (Test-Path $global:_shellishBin)) { Write-Error "shellish bin missing: $global:_shellishBin"; exit 1 }
          Write-Host "Windows PowerShell 5.1 profile load OK: $global:_shellishBin"

      - name: Check required files exist
        run: |
          $files = @(
            "bin\shellish.cmd",
            "lib\shellish-cmd.js",
            "lib\safe-rm.js",
            "lib\run.js",
            "lib\render.js",
            "lib\context.js",
            "shell\profile.ps1",
            "install.ps1"
          )
          foreach ($f in $files) {
            if (Test-Path $f) { Write-Host "  OK  $f" }
            else { Write-Error "MISSING: $f"; exit 1 }
          }

      - name: Simulate config + test CLI
        run: |
          $cfgDir = "$env:USERPROFILE\.config\shellish"
          New-Item -ItemType Directory -Force $cfgDir | Out-Null
          [System.IO.File]::WriteAllText(
            "$cfgDir\config",
            "agent=pi`nconfirm_danger=ask`n",
            (New-Object System.Text.UTF8Encoding($false))
          )
          node lib\shellish-cmd.js version
          node lib\shellish-cmd.js help
          node lib\shellish-cmd.js status

      - name: Test legacy UTF-16 config is readable
        shell: powershell
        run: |
          $cfgDir = "$env:USERPROFILE\.config\shellish"
          [System.IO.File]::WriteAllText("$cfgDir\config", "agent=codex`nconfirm_danger=ask`n", [System.Text.Encoding]::Unicode)
          node lib\shellish-cmd.js status

      - name: Test --from-shell is not leaked by batch entrypoint
        shell: cmd
        env:
          SHELLISH_DRY_RUN: "1"
        run: |
          bin\shellish.cmd --from-shell 你是什么模型 > out.txt
          type out.txt
          findstr /C:"--from-shell" out.txt
          if %ERRORLEVEL% EQU 0 exit /b 1
          findstr /C:"DRY_RUN fromShell=1" out.txt
          if %ERRORLEVEL% NEQ 0 exit /b 1

      - name: Test context.js build
        run: |
          $out = node lib\context.js build $PWD "list files"
          if ($out -match "Instructions") { Write-Host "context.js OK" }
          else { Write-Error "context.js unexpected output"; exit 1 }

      - name: Test safe-rm.js (no-op, allow mode)
        run: |
          $env:SHELLISH_CONFIRM_DANGER = "allow"
          $env:SHELLISH_SESSION_DIR = $env:TEMP
          node lib\safe-rm.js
          Write-Host "safe-rm.js OK"
