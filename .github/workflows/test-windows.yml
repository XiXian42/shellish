name: Test Windows Install

on:
  push:
    branches: [feat/windows]
  pull_request:
    branches: [main, feat/windows]

jobs:
  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check PowerShell version
        run: |
          $PSVersionTable.PSVersion
          node --version
          git --version

      - name: Syntax check - shellish-cmd.js
        run: node --check lib\shellish-cmd.js

      - name: Syntax check - safe-rm.js
        run: node --check lib\safe-rm.js

      - name: Syntax check - run.js
        run: node --check lib\run.js

      - name: Syntax check - render.js
        run: node --check lib\render.js

      - name: Syntax check - context.js
        run: node --check lib\context.js

      - name: Test install.ps1 (dry run - syntax only)
        run: |
          # Parse the script for syntax errors without executing
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\install.ps1", [ref]$null, [ref]$null
          )
          Write-Host "install.ps1 syntax OK"

      - name: Test profile.ps1 syntax
        run: |
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\shell\profile.ps1", [ref]$null, [ref]$null
          )
          Write-Host "profile.ps1 syntax OK"

      - name: Test shellish.cmd exists and is readable
        run: |
          if (Test-Path "bin\shellish.cmd") {
            Write-Host "shellish.cmd OK"
            Get-Content "bin\shellish.cmd"
          } else {
            Write-Error "shellish.cmd not found"
          }

      - name: Simulate install (skip agent detection, set mock config)
        run: |
          # Create config as install.ps1 would
          $cfgDir = "$env:USERPROFILE\.config\shellish"
          New-Item -ItemType Directory -Force $cfgDir | Out-Null
          @"
          agent=pi
          confirm_danger=ask
          "@ | Set-Content "$cfgDir\config"
          Write-Host "Config written: $cfgDir\config"
          Get-Content "$cfgDir\config"

      - name: Test shellish-cmd.js - version
        run: node lib\shellish-cmd.js version

      - name: Test shellish-cmd.js - help
        run: node lib\shellish-cmd.js help

      - name: Test shellish-cmd.js - status
        run: node lib\shellish-cmd.js status

      - name: Test context.js - build prompt
        run: |
          $prompt = node lib\context.js build $PWD "list files in current directory"
          if ($prompt -match "Instructions") {
            Write-Host "context.js build OK"
          } else {
            Write-Error "context.js build output unexpected"
          }

      - name: Test safe-rm.js help (no real files, just check it starts)
        run: |
          # Should exit 0 with no args (nothing to delete)
          $env:SHELLISH_CONFIRM_DANGER = "allow"
          $env:SHELLISH_SESSION_DIR = $env:TEMP
          node lib\safe-rm.js
          Write-Host "safe-rm.js loaded OK"
